---
apiVersion: v1
kind: Secret
metadata:
  name: "${NAME}"
type: Opaque
data:
  username: "${USER}"
  password: "${PASSWORD}"
---
apiVersion: metal3.io/v1alpha1
kind: BareMetalHost
metadata:
  name: "${NAME}"
spec:
  online: true
  bootMACAddress: "${MAC_ADDRESS}"
  bootMode: legacy
  bmc:
    address: ilo4://"${IP_ADDRESS}"
    credentialsName: "${NAME}"
    disableCertificateVerification: true
  rootDeviceHints:
    deviceName: "${ROOTDEVICEHINT}"
